# Kitty terminal -- ayu dark palette

# Font
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
disable_ligatures always

# Better light-on-dark readability
text_composition_strategy 1.7 0

# Window
window_padding_width  4
hide_window_decorations yes
confirm_os_window_close 0

# Shell integration
shell_integration enabled

# Right-click selects the whole output block of the command under the cursor.
# Relies on OSC 133 prompt marks (emitted by p10k when
# POWERLEVEL9K_TERM_SHELL_INTEGRATION=true).
mouse_map right press ungrabbed mouse_select_command_output

# Jump to previous/next prompt in scrollback.
map ctrl+shift+z scroll_to_prompt -1
map ctrl+shift+x scroll_to_prompt 1

# Open last command's output in a pager.
map ctrl+shift+g show_last_command_output


# Colors -- ayu dark
foreground #B8B5AC
background #0B0E14
cursor     #FF8F40
cursor_text_color #0B0E14
selection_foreground #0B0E14
selection_background #FF8F40

# Black
color0  #0B0E14
color8  #3d4046

# Red
color1  #F07178
color9  #F07178

# Green
color2  #AAD94C
color10 #AAD94C

# Yellow
color3  #E6C54C
color11 #FFEE99

# Blue
color4  #59C2FF
color12 #59C2FF

# Magenta
color5  #D2A6FF
color13 #D2A6FF

# Cyan
color6  #39BAE6
color14 #80DDB8

# White
color7  #B8B5AC
color15 #c9c7be
